<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXA IMMOBILIER - Accueil</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
</head>
<body>

<header>
    <h1>NEXA IMMOBILIER</h1>
    <p>RÊVEZ GRAND, INVESTISSEZ MALIN</p>
    <nav><a href="depot.html">Vendre un bien</a></nav>
</header>

<div class="container">
    <h2 style="text-align:center; color: var(--bleu-nexa);">Nos Opportunités à Yamoussoukro</h2>
    <div id="annonces-grid" class="grid">
        </div>
</div>

<script>
  // Configuration Firebase (Tes clés sont correctes !)
  const firebaseConfig = {
    apiKey: "AIzaSyAbEaaPhzId0T7dkFM-wJ1sOrMVgWNobyQ",
    authDomain: "nexa-immobilier-site.firebaseapp.com",
    projectId: "nexa-immobilier-site",
    storageBucket: "nexa-immobilier-site.firebasestorage.app",
    messagingSenderId: "564601467900",
    appId: "1:564601467900:web:a252fb5a85db328c99b879"
  };

  // INITIALISATION (Version Compat - sans les 'import')
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // RECUPERATION DES ANNONCES
  db.collection("annonces").where("statut", "==", "valide").onSnapshot((snapshot) => {
      const grid = document.getElementById("annonces-grid");
      grid.innerHTML = "";
      snapshot.forEach((doc) => {
          const data = doc.data();
          grid.innerHTML += `
              <div class="card">
                  <img src="${data.imageUrl || 'https://via.placeholder.com/400x250?text=Nexa+Immo'}" alt="Nexa Immo">
                  <div class="card-content">
                      <h3>${data.titre}</h3>
                      <div class="price">${data.prix} FCFA</div>
                      <p>${data.description}</p>
                      <button class="btn-contact" onclick="contactAdmin('${data.titre}')">Contacter NEXA</button>
                  </div>
              </div>`;
      });
  }, (error) => {
      console.error("Erreur Firestore : ", error);
  });

  // FONCTION WHATSAPP
  function contactAdmin(titre) {
      const monWhatsApp = "22500000000"; // N'oublie pas de mettre TON VRAI NUMÉRO ici
      const msg = encodeURIComponent("Bonjour Babsy, je suis intéressé par l'annonce : " + titre);
      window.open(`https://wa.me/${monWhatsApp}?text=${msg}`);
  }
</script>
</body>
</html>
