<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXA IMMOBILIER - Accueil</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
</head>
<body>

<header>
    <div class="logo-container">
        <img src="logo.png" alt="Logo Nexa Immobilier" style="max-width: 150px; margin-bottom: 10px;">
    </div>

    <h1>NEXA IMMOBILIER</h1>
    <p>RÊVEZ GRAND, INVESTISSEZ MALIN</p>
    
    <nav>
        <a href="depot.html" class="btn-nav">Vendre un bien</a>
        <a href="admin.html" class="btn-nav admin-btn" style="background-color: #ffc107; color: #003366; margin-left: 10px; font-weight: bold;">Espace Admin</a>
    </nav>
</header>

<div class="container">
    <h2 style="text-align:center; color: #003366;">Nos Opportunités Partout en Côte d'Ivoire</h2>
    <div id="annonces-grid" class="grid">
        </div>
</div>

    <footer style="background-color: #2c3e50; color: white; padding: 20px 0; text-align: center; margin-top: 50px;">
    <div class="footer-content">
        <p><strong>Nexa Immobilier</strong> - Nexa Immobilier - Expertise immobilière et foncière à Yamoussoukro</p>
        <p style="font-size: 0.9em;">
            &copy; <span id="currentYear"></span> Tous droits réservés. 
            | <a href="mentions.html" style="color: #3498db; text-decoration: none;">Mentions Légales & Confidentialité</a>
        </p>
    </div>
</footer>
    
<script>
  // CONFIGURATION MISE À JOUR (Projet : nexa-immobilier-acd8f)
  const firebaseConfig = {
    apiKey: "AIzaSyAbEaaPhzId0T7dkFM-wJ1sOrMVgWNobyQ",
    authDomain: "nexa-immobilier-acd8f.firebaseapp.com",
    projectId: "nexa-immobilier-acd8f",
    storageBucket: "nexa-immobilier-acd8f.firebasestorage.app",
    messagingSenderId: "564601467900",
    appId: "1:564601467900:web:a252fb5a85db328c99b879"
  };

  // INITIALISATION FIREBASE
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // RÉCUPÉRATION DES ANNONCES VALIDÉES
  db.collection("annonces").where("statut", "==", "valide").onSnapshot((snapshot) => {
      const grid = document.getElementById("annonces-grid");
      grid.innerHTML = ""; // Vide la grille avant de recharger

      snapshot.forEach((doc) => {
          const data = doc.data();
          
          // Vérification si le tableau d'images existe et n'est pas vide
          // On prend la première image (index 0)
          let photoAAfficher = 'https://via.placeholder.com/400x250?text=Nexa+Immo';
          
          if (data.images && Array.isArray(data.images) && data.images.length > 0) {
              photoAAfficher = data.images[0];
          }

          grid.innerHTML += `
              <div class="card">
                  <div style="width: 100%; height: 220px; overflow: hidden; border-radius: 8px 8px 0 0;">
                      <img src="${photoAAfficher}" alt="${data.titre}" style="width: 100%; height: 100%; object-fit: cover;">
                  </div>
                  <div class="card-content">
                      <h3 style="margin-top: 10px; color: #003366;">${data.titre}</h3>
                      <div class="price" style="color: #d32f2f; font-weight: bold; font-size: 1.2em; margin: 5px 0;">${data.prix} FCFA</div>
                      <p style="font-size: 0.9em; color: #555;">${data.description}</p>
                      <button class="btn-contact" onclick="contactAdmin('${data.titre}')" style="background-color: #003366; color: white; border: none; padding: 10px; width: 100%; cursor: pointer; border-radius: 5px; margin-top: 10px;">Contacter NEXA</button>
                  </div>
              </div>`;
      });
  }, (error) => {
      console.error("Erreur lors de la lecture des données : ", error);
  });

  // FONCTION CONTACT WHATSAPP
  function contactAdmin(titre) {
      const monWhatsApp = "2250151288644"; 
      const msg = encodeURIComponent("Bonjour Babsy, je suis intéressé par l'annonce : " + titre);
      window.open(`https://wa.me/${monWhatsApp}?text=${msg}`);
  }

    // Script pour mettre à jour l'année automatiquement
    document.getElementById("currentYear").textContent = new Date().getFullYear();
</script>

<style>
/* Petits ajouts pour que la grille soit propre */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
    padding: 20px;
}
.card {
    border: 1px solid #ddd;
    border-radius: 8px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    background: #fff;
    transition: transform 0.3s;
}
.card:hover {
    transform: translateY(-5px);
}
.card-content {
    padding: 15px;
}
</style>

</body>
</html>
