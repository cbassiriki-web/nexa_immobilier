<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXA IMMOBILIER - Accueil</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
</head>
<body>

<header>
    <div class="logo-container">
        <img src="logo.png" alt="Logo Nexa Immobilier" style="max-width: 150px; margin-bottom: 10px;">
    </div>

    <h1>NEXA IMMOBILIER</h1>
    <p>RÊVEZ GRAND, INVESTISSEZ MALIN</p>
    
    <nav>
        <a href="depot.html" class="btn-nav">Vendre un bien</a>
        <a href="admin.html" class="btn-nav admin-btn" style="background-color: #ffc107; color: #003366; margin-left: 10px; font-weight: bold;">Espace Admin</a>
    </nav>
</header>

<div class="container">
    <h2 style="text-align:center; color: var(--bleu-nexa);">Nos Opportunités à Yamoussoukro</h2>
    <div id="annonces-grid" class="grid">
        </div>
</div>

<script>
  // Configuration Firebase (Vérifiez bien que le projectId correspond à votre console)
  const firebaseConfig = {
    apiKey: "AIzaSyAbEaaPhzId0T7dkFM-wJ1sOrMVgWNobyQ",
    authDomain: "nexa-immobilier-acd8f.firebaseapp.com",
    projectId: "nexa-immobilier-acd8f", // Corrigé selon votre capture
    storageBucket: "nexa-immobilier-acd8f.firebasestorage.app",
    messagingSenderId: "564601467900",
    appId: "1:564601467900:web:a252fb5a85db328c99b879"
  };

  // INITIALISATION
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // RECUPERATION DES ANNONCES
  db.collection("annonces").where("statut", "==", "valide").onSnapshot((snapshot) => {
      const grid = document.getElementById("annonces-grid");
      grid.innerHTML = "";
      snapshot.forEach((doc) => {
          const data = doc.data();
          
          // On récupère la première image du tableau 'images' s'il existe
          const premiereImage = (data.images && data.images.length > 0) 
                                ? data.images[0] 
                                : 'https://via.placeholder.com/400x250?text=Nexa+Immo';

          grid.innerHTML += `
              <div class="card">
                  <img src="${premiereImage}" alt="Nexa Immo" style="width:100%; height:200px; object-fit:cover;">
                  <div class="card-content">
                      <h3>${data.titre}</h3>
                      <div class="price">${data.prix} FCFA</div>
                      <p>${data.description}</p>
                      <button class="btn-contact" onclick="contactAdmin('${data.titre}')">Contacter NEXA</button>
                  </div>
              </div>`;
      });
  }, (error) => {
      console.error("Erreur Firestore : ", error);
  });

  // FONCTION WHATSAPP
  function contactAdmin(titre) {
      const monWhatsApp = "2250151288644"; 
      const msg = encodeURIComponent("Bonjour Babsy, je suis intéressé par l'annonce : " + titre);
      window.open(`https://wa.me/${monWhatsApp}?text=${msg}`);
  }
</script>
</body>
</html>
