<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendre - NEXA IMMOBILIER</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo-container">
        <img src="logo.png" alt="Logo Nexa Immobilier" style="max-width: 120px; margin-bottom: 10px;">
    </div>
    <h1>NEXA IMMOBILIER</h1>
    <nav><a href="index.html">Retour à l'accueil</a></nav>
</header>

<div class="container">
    <div id="form-container">
        <form id="formVendeur">
            <h2 style="color: var(--bleu-nexa)">Déposer votre annonce</h2>
            
            <label>Titre de l'annonce</label>
            <input type="text" id="titre" placeholder="ex: Terrain 500m² à Zatta" required>
            
            <label>Description (Sans numéro de téléphone)</label>
            <textarea id="desc" placeholder="Détails du bien (maison, terrain, véhicule...)" rows="5" required></textarea>
            
            <label>Prix (FCFA)</label>
            <input type="number" id="prix" required>

            <label>Joindre des images ou vidéos (Max 3)</label>
            <input type="file" id="fichiers" accept="image/*,video/*" multiple style="margin-bottom: 20px; border: 1px dashed var(--bleu-nexa); padding: 10px; width: 100%;">
            
            <label style="font-weight: bold; color: #003366;">Vous êtes :</label>
            <select id="statut_publieur" style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px; background: white; margin-bottom: 20px;" required>
                <option value="" disabled selected>Choisissez votre statut...</option>
                <option value="Propriétaire">Propriétaire (C'est mon terrain)</option>
                <option value="Démarcheur">Démarcheur (Intermédiaire)</option>
            </select>

            <label>Votre Contact WhatsApp (Masqué au public)</label>
            <input type="text" id="vendeur_contact" placeholder="Pour que Babsy vous contacte" required>

            <button type="submit" id="submitBtn" class="btn-contact">Soumettre pour validation</button>
        </form>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
  import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDY92WJbHCJ4P50orqd59tXJ5CuvZhLCIk",
    authDomain: "nexa-immobilier-acd8f.firebaseapp.com",
    projectId: "nexa-immobilier-acd8f",
    storageBucket: "nexa-immobilier-acd8f.firebasestorage.app",
    messagingSenderId: "429960511942",
    appId: "1:429960511942:web:1e8b5c3b0331163f13f2c7",
    measurementId: "G-86LFE1EG8S"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const storage = getStorage(app);

  document.getElementById("formVendeur").addEventListener("submit", async function(e) {
      e.preventDefault();
      
      const btn = document.getElementById("submitBtn");
      const description = document.getElementById("desc").value;
      const fichiers = document.getElementById("fichiers").files;
      const statutPublieur = document.getElementById("statut_publieur").value; // RECUPERATION ICI

      if (/\d{8,}/.test(description)) {
          alert("⚠️ Sécurité NEXA : Veuillez retirer votre numéro de téléphone de la description.");
          return;
      }

      btn.disabled = true;
      btn.innerText = "Téléchargement des médias...";

      let urlsMedias = [];

      try {
          for (let i = 0; i < fichiers.length; i++) {
              const file = fichiers[i];
              const storageRef = ref(storage, 'annonces/' + Date.now() + "_" + file.name);
              const snapshot = await uploadBytes(storageRef, file);
              const url = await getDownloadURL(snapshot.ref);
              urlsMedias.push(url);
          }

          btn.innerText = "Enregistrement de l'annonce...";

          await addDoc(collection(db, "annonces"), {
              titre: document.getElementById("titre").value,
              description: description,
              prix: document.getElementById("prix").value,
              contact_vendeur: document.getElementById("vendeur_contact").value,
              type_vendeur: statutPublieur, // ENREGISTREMENT ICI
              images: urlsMedias,
              statut: "en_attente",
              date: new Date().toISOString()
          });

          document.getElementById("form-container").innerHTML = `
              <div style="text-align:center; padding:40px; background:white; border-radius:10px; border: 2px solid var(--or-nexa);">
                  <h1 style="color:green;">✅ Reçu !</h1>
                  <p>Votre annonce est en cours de validation par l'équipe Nexa.</p>
                  <br><a href="index.html" class="btn-contact" style="text-decoration:none;">Retour à l'accueil</a>
              </div>`;

      } catch (error) {
          console.error(error);
          alert("Erreur : " + error.message);
          btn.disabled = false;
          btn.innerText = "Soumettre pour validation";
      }
  });
</script>
</body>
</html>
