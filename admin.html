<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXA - Administration</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <style>
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #003366; display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-box { background: white; padding: 30px; border-radius: 10px; width: 300px; text-align: center; }
        .login-box input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        .admin-card { border: 1px solid #ccc; margin: 10px 0; padding: 15px; display: flex; align-items: center; gap: 20px; background: #f9f9f9; border-radius: 8px; }
        .admin-card img { width: 80px; height: 80px; object-fit: cover; border-radius: 5px; }
        .btn-valider { background: #2e7d32; color: white; border: none; padding: 8px; cursor: pointer; border-radius: 5px; }
        .btn-vendu { background: #003366; color: white; border: none; padding: 8px; cursor: pointer; border-radius: 5px; }
        .btn-supprimer { background: #d32f2f; color: white; border: none; padding: 8px; cursor: pointer; border-radius: 5px; }
        #admin-content { display: none; padding: 20px; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h3>Accès Admin Babsy</h3>
        <input type="text" id="admin-user" placeholder="Identifiant">
        <input type="password" id="admin-pass" placeholder="Mot de passe">
        <button onclick="verifierLogin()" style="width:100%; padding:10px; background:#ffc107; border:none; font-weight:bold; cursor:pointer;">Se connecter</button>
    </div>
</div>

<div id="admin-content">
    <header>
        <h1>Tableau de Bord Nexa</h1>
        <nav><a href="index.html" class="btn-nav">Retour au site</a></nav>
    </header>

    <h2>Gestion des Annonces</h2>
    <div id="admin-list"></div>

    <h2 style="margin-top:40px;">Modération des Avis</h2>
    <div id="admin-avis-list"></div>
</div>

<script>
    const MON_IDENTIFIANT = "BabsyAdmin"; 
    const MON_MOT_DE_PASSE = "Babsycoul0833"; 

    const firebaseConfig = {
        apiKey: "AIzaSyAbEaaPhzId0T7dkFM-wJ1sOrMVgWNobyQ",
        authDomain: "nexa-immobilier-acd8f.firebaseapp.com",
        projectId: "nexa-immobilier-acd8f",
        storageBucket: "nexa-immobilier-acd8f.firebasestorage.app",
        messagingSenderId: "564601467900",
        appId: "1:564601467900:web:a252fb5a85db328c99b879"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function verifierLogin() {
        if(document.getElementById('admin-user').value === MON_IDENTIFIANT && document.getElementById('admin-pass').value === MON_MOT_DE_PASSE) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('admin-content').style.display = 'block';
            chargerAnnonces();
            chargerAvis();
        } else { alert("Accès refusé"); }
    }

    function chargerAnnonces() {
        db.collection("annonces").orderBy("date", "desc").onSnapshot((snapshot) => {
            const list = document.getElementById("admin-list");
            list.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                const id = doc.id;
                const isValide = data.statut === "valide";
                const estVendu = data.vendu === true;
                const photo = (data.images && data.images.length > 0) ? data.images[0] : 'https://via.placeholder.com/80';

                list.innerHTML += `
                    <div class="admin-card" style="border-left: 5px solid ${estVendu ? 'red' : (isValide ? 'green' : 'orange')}">
                        <img src="${photo}">
                        <div style="flex-grow: 1;">
                            <strong>${data.titre}</strong> ${estVendu ? '<span style="color:red;">[VENDU]</span>' : ''}<br>
                            <small>${data.prix} FCFA</small>
                        </div>
                        <div>
                            ${!isValide ? `<button class="btn-valider" onclick="majAnnonce('${id}', {statut:'valide'})">Valider</button>` : ''}
                            ${(isValide && !estVendu) ? `<button class="btn-vendu" onclick="majAnnonce('${id}', {vendu:true})">Marquer Vendu</button>` : ''}
                            <button class="btn-supprimer" onclick="supprimerDoc('annonces', '${id}')">Supprimer</button>
                        </div>
                    </div>`;
            });
        });
    }

    function chargerAvis() {
        db.collection("temoignages").orderBy("date", "desc").onSnapshot((snapshot) => {
            const list = document.getElementById("admin-avis-list");
            list.innerHTML = "";
            snapshot.forEach((doc) => {
                const avis = doc.data();
                const id = doc.id;
                list.innerHTML += `
                    <div class="admin-card">
                        <div style="flex-grow: 1;">
                            <strong>${avis.nom}</strong>: ${avis.message}
                        </div>
                        <div>
                            ${!avis.valide ? `<button class="btn-valider" onclick="majAvis('${id}', {valide:true})">Approuver</button>` : ''}
                            <button class="btn-supprimer" onclick="supprimerDoc('temoignages', '${id}')">Supprimer</button>
                        </div>
                    </div>`;
            });
        });
    }

    function majAnnonce(id, data) { if(confirm("Confirmer la modification ?")) db.collection("annonces").doc(id).update(data); }
    function majAvis(id, data) { db.collection("temoignages").doc(id).update(data); }
    function supprimerDoc(col, id) { if(confirm("Supprimer définitivement ?")) db.collection(col).doc(id).delete(); }
</script>
</body>
</html>
