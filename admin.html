<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXA IMMOBILIER - Administration</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <style>
        .admin-card { border: 1px solid #ccc; margin: 10px; padding: 15px; display: flex; align-items: center; gap: 20px; background: #f9f9f9; border-radius: 8px; }
        .admin-card img { width: 100px; height: 100px; object-fit: cover; border-radius: 5px; }
        .status-badge { padding: 5px 10px; border-radius: 4px; font-weight: bold; }
        .status-valide { background: #c8e6c9; color: #2e7d32; }
        .status-attente { background: #fff9c4; color: #f9a825; }
        .btn-valider { background: #2e7d32; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 5px; }
        .btn-supprimer { background: #d32f2f; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

<header>
    <h1>Espace Administration</h1>
    <p>Gestion des annonces Nexa Immobilier</p>
    <nav><a href="index.html" class="btn-nav">Retour au site</a></nav>
</header>

<div class="container">
    <h2>Toutes les annonces</h2>
    <div id="admin-list">
        </div>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAbEaaPhzId0T7dkFM-wJ1sOrMVgWNobyQ",
    authDomain: "nexa-immobilier-acd8f.firebaseapp.com",
    projectId: "nexa-immobilier-acd8f",
    storageBucket: "nexa-immobilier-acd8f.firebasestorage.app",
    messagingSenderId: "564601467900",
    appId: "1:564601467900:web:a252fb5a85db328c99b879"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // Afficher toutes les annonces
  db.collection("annonces").orderBy("date", "desc").onSnapshot((snapshot) => {
      const list = document.getElementById("admin-list");
      list.innerHTML = "";

      snapshot.forEach((doc) => {
          const data = doc.data();
          const id = doc.id;
          const isValide = data.statut === "valide";
          const photo = (data.images && data.images.length > 0) ? data.images[0] : 'https://via.placeholder.com/100';

          list.innerHTML += `
              <div class="admin-card">
                  <img src="${photo}" alt="Aperçu">
                  <div style="flex-grow: 1;">
                      <strong>${data.titre}</strong><br>
                      <small>${data.prix} FCFA</small><br>
                      <span class="status-badge ${isValide ? 'status-valide' : 'status-attente'}">
                          ${isValide ? 'Publié' : 'En attente'}
                      </span>
                  </div>
                  <div>
                      ${!isValide ? `<button class="btn-valider" onclick="validerAnnonce('${id}')">Valider</button>` : ''}
                      <button class="btn-supprimer" onclick="supprimerAnnonce('${id}')">Supprimer</button>
                  </div>
              </div>`;
      });
  });

  // Fonction pour valider
  function validerAnnonce(id) {
      if(confirm("Publier cette annonce sur le site ?")) {
          db.collection("annonces").doc(id).update({ statut: "valide" })
          .then(() => alert("Annonce publiée !"))
          .catch(err => console.error(err));
      }
  }

  // Fonction pour supprimer
  function supprimerAnnonce(id) {
      if(confirm("Supprimer définitivement cette annonce ?")) {
          db.collection("annonces").doc(id).delete()
          .then(() => alert("Annonce supprimée !"))
          .catch(err => console.error(err));
      }
  }
</script>

</body>
</html>
