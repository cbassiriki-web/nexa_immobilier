<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXA - Administration</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <style>
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #003366; display: flex; align-items: center; justify-content: center; z-index: 1000; color:white; }
        .login-box { background: white; padding: 30px; border-radius: 10px; width: 300px; text-align: center; color: #333; }
        .login-box input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .admin-card { border: 1px solid #ccc; margin: 15px 0; padding: 15px; display: flex; align-items: flex-start; gap: 20px; background: #f9f9f9; border-radius: 8px; }
        .admin-card img { width: 100px; height: 100px; object-fit: cover; border-radius: 5px; flex-shrink: 0; }
        .btn-valider { background: #2e7d32; color: white; border: none; padding: 8px 12px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .btn-vendu { background: #003366; color: white; border: none; padding: 8px 12px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .btn-supprimer { background: #d32f2f; color: white; border: none; padding: 8px 12px; cursor: pointer; border-radius: 5px; }
        #admin-content { display: none; padding: 20px; max-width: 900px; margin: auto; }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 0.8em; font-weight: bold; margin-left: 10px; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h3>Accès Admin Babsy</h3>
        <input type="text" id="admin-user" placeholder="Identifiant">
        <input type="password" id="admin-pass" placeholder="Mot de passe">
        <button onclick="verifierLogin()" style="width:100%; padding:10px; background:#ffc107; border:none; font-weight:bold; cursor:pointer; border-radius:5px;">Se connecter</button>
    </div>
</div>

<div id="admin-content">
    <header style="border-bottom: 2px solid #003366; margin-bottom: 20px; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; background: #f4f4f4; padding: 15px; border-radius: 8px;">
    <h1 style="margin: 0; color: #003366;">Dashboard Nexa</h1>
    <a href="index.html" style="text-decoration: none; background: #003366; color: white; padding: 10px 20px; border-radius: 5px; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">
        ← Retour au Site
    </a>
    </header>

    <h2>📢 Annonces Déposées</h2>
    <div id="admin-list"></div>

    <h2 style="margin-top:50px;">💬 Modération des Avis</h2>
    <div id="admin-avis-list"></div>
</div>

<script>
    const MON_IDENTIFIANT = "BabsyAdmin"; 
    const MON_MOT_DE_PASSE = "Babsycoul0833";

    const firebaseConfig = {
        apiKey: "AIzaSyAbEaaPhzId0T7dkFM-wJ1sOrMVgWNobyQ",
        authDomain: "nexa-immobilier-acd8f.firebaseapp.com",
        projectId: "nexa-immobilier-acd8f",
        storageBucket: "nexa-immobilier-acd8f.firebasestorage.app",
        messagingSenderId: "564601467900",
        appId: "1:564601467900:web:a252fb5a85db328c99b879"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function verifierLogin() {
        if(document.getElementById('admin-user').value === MON_IDENTIFIANT && document.getElementById('admin-pass').value === MON_MOT_DE_PASSE) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('admin-content').style.display = 'block';
            chargerAnnonces();
            chargerAvis();
        } else { alert("Accès refusé"); }
    }

    function chargerAnnonces() {
        db.collection("annonces").orderBy("date", "desc").onSnapshot((snapshot) => {
            const list = document.getElementById("admin-list");
            list.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                const id = doc.id;
                const isValide = data.statut === "valide";
                const estVendu = data.vendu === true;
                const photo = (data.images && data.images.length > 0) ? data.images[0] : 'https://via.placeholder.com/100';
                
                list.innerHTML += `
                    <div class="admin-card" style="border-left: 6px solid ${estVendu ? 'red' : (isValide ? '#2e7d32' : '#ffc107')}">
                        <img src="${photo}">
                        <div style="flex-grow: 1;">
                            <strong>${data.titre}</strong> ${estVendu ? '<b style="color:red;">[VENDU]</b>' : ''}<br>
                            <span style="color:#d32f2f; font-weight:bold;">${data.prix} FCFA</span><br>
                            <p style="font-size:0.85em; margin:5px 0;">${data.description || data.desc || ""}</p>
                            <small>Contact : ${data.contact_vendeur || 'N/A'}</small><br>
                            <small>Rôle : <b>${data.type_vendeur || 'Non spécifié'}</b></small>
                        </div>
                        <div style="display:flex; flex-direction:column; gap:5px;">
                            ${!isValide ? `<button class="btn-valider" onclick="majAnnonce('${id}', {statut:'valide'})">Valider</button>` : ''}
                            ${(isValide && !estVendu) ? `<button class="btn-vendu" onclick="majAnnonce('${id}', {vendu:true})">Marquer Vendu</button>` : ''}
                            <button class="btn-supprimer" onclick="supprimerDoc('annonces', '${id}')">Supprimer</button>
                        </div>
                    </div>`;
            });
        });
    }

    function chargerAvis() {
        db.collection("temoignages").orderBy("date", "desc").onSnapshot((snapshot) => {
            const list = document.getElementById("admin-avis-list");
            list.innerHTML = "";
            snapshot.forEach((doc) => {
                const avis = doc.data();
                const id = doc.id;
                const estPublie = avis.valide === true;

                list.innerHTML += `
                    <div class="admin-card" style="border-left: 6px solid ${estPublie ? '#2e7d32' : '#ffc107'}">
                        <div style="flex-grow: 1;">
                            <strong>${avis.nom}</strong> 
                            <span class="status-badge" style="background:${estPublie ? '#e8f5e9' : '#fff9c4'}; color:${estPublie ? '#2e7d32' : '#fbc02d'};">
                                ${estPublie ? 'En ligne' : 'En attente'}
                            </span><br>
                            <p style="font-style:italic; margin-top:5px;">"${avis.message}"</p>
                        </div>
                        <div style="display:flex; flex-direction:column; gap:5px;">
                            ${!estPublie ? `<button class="btn-valider" onclick="majAvis('${id}', {valide:true})">Publier</button>` : ''}
                            <button class="btn-supprimer" onclick="supprimerDoc('temoignages', '${id}')">Supprimer</button>
                        </div>
                    </div>`;
            });
        });
    }

    function majAnnonce(id, data) { if(confirm("Confirmer la modification ?")) db.collection("annonces").doc(id).update(data); }
    
    function majAvis(id, data) { 
        if(confirm("Rendre cet avis visible sur la page d'accueil ?")) {
            db.collection("temoignages").doc(id).update(data); 
        }
    }

    function supprimerDoc(col, id) { if(confirm("Supprimer définitivement ?")) db.collection(col).doc(id).delete(); }
</script>
</body>
</html>
